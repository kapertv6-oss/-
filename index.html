<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnimeZen</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<style>
body{background:#0f0f14;color:#fff;font-family:Inter,sans-serif;overflow-x:hidden}
.glass{background:rgba(20,20,30,.8);backdrop-filter:blur(20px)}
.card{transition:.35s cubic-bezier(.2,.8,.2,1)}
.card:hover{transform:scale(1.06);box-shadow:0 20px 40px rgba(0,0,0,.6)}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);align-items:center;justify-content:center;z-index:100}
.modal.active{display:flex;animation:fade .3s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.slide-section{transition:.5s ease;transform:translateY(40px);opacity:0}
.slide-section.active{transform:translateY(0);opacity:1}
input,textarea{background:#1c1c24}
.news-card{cursor:pointer;transition:.3s}
.news-card:hover{transform:translateY(-5px)}
</style>
</head>
<body>

<header class="glass fixed top-0 w-full px-8 py-4 flex justify-between items-center z-50">
<div class="text-2xl font-black text-purple-400">ANIMEZEN</div>

<div class="flex gap-4 items-center">
<button onclick="openNews()" class="text-gray-300 hover:text-purple-400">Новости</button>
<button onclick="openAnime()" class="text-gray-300 hover:text-purple-400">Аниме</button>

<button id="adminBtn" onclick="toggleModal('adminModal')"
class="hidden bg-purple-600 px-4 py-2 rounded-xl text-sm">Админ</button>

<button id="authBtn" onclick="toggleModal('authModal')"
class="bg-purple-600 px-4 py-2 rounded-xl text-sm">Войти</button>

<button id="logoutBtn" onclick="logout()"
class="hidden bg-red-600 px-4 py-2 rounded-xl text-sm">Выйти</button>
</div>
</header>

<!-- NEWS SECTION -->
<section id="newsSection"
class="slide-section pt-32 max-w-5xl mx-auto px-8 pb-20 hidden">
<h2 class="text-3xl text-purple-400 mb-10 font-bold">Новости сайта</h2>
<div id="newsContainer" class="space-y-6"></div>
</section>

<!-- ANIME SECTION -->
<section id="animeSection"
class="slide-section active pt-32 max-w-7xl mx-auto px-8 pb-20">
<div id="animeGrid" class="grid grid-cols-2 md:grid-cols-5 gap-8"></div>
</section>

<!-- AUTH MODAL -->
<div id="authModal" class="modal">
<div class="bg-[#181822] p-10 rounded-3xl w-96">
<h2 id="authTitle" class="text-xl mb-6 text-purple-400 font-bold">Вход</h2>

<input id="authEmail" type="email" placeholder="Email"
class="w-full p-3 mb-4 rounded-xl">

<input id="authPassword" type="password" placeholder="Пароль"
class="w-full p-3 mb-6 rounded-xl">

<button id="authActionBtn" onclick="authAction()"
class="w-full bg-purple-600 py-3 rounded-xl font-bold">
Войти
</button>

<p id="authSwitch" onclick="toggleAuthMode()"
class="mt-6 text-center text-gray-400 cursor-pointer">
Нет аккаунта? Создайте!
</p>
</div>
</div>

<!-- ADMIN -->
<div id="adminModal" class="modal">
<div class="bg-[#181822] p-10 rounded-3xl w-[500px] max-h-[90vh] overflow-y-auto">

<h2 class="text-xl text-purple-400 mb-4 font-bold">Добавить новость</h2>

<input id="newsTitle" placeholder="Заголовок"
class="w-full p-3 mb-3 rounded-xl">

<textarea id="newsText" placeholder="Текст"
class="w-full p-3 mb-3 rounded-xl h-28"></textarea>

<input id="newsImg" placeholder="URL изображения"
class="w-full p-3 mb-4 rounded-xl">

<button onclick="addNews()"
class="w-full bg-purple-600 py-3 rounded-xl font-bold">
Опубликовать
</button>

</div>
</div>

<!-- NEWS VIEW MODAL -->
<div id="newsViewModal" class="modal">
<div class="bg-[#181822] p-10 rounded-3xl w-[700px] max-h-[90vh] overflow-y-auto">
<h2 id="viewTitle" class="text-2xl text-purple-400 mb-4 font-bold"></h2>
<p id="viewText" class="mb-6 text-gray-300"></p>
<img id="viewImg" class="rounded-xl mb-4 hidden">
<button onclick="toggleModal('newsViewModal')"
class="bg-purple-600 px-6 py-2 rounded-xl">Закрыть</button>
</div>
</div>

<script>
firebase.initializeApp({
apiKey:"AIzaSyAAigsanR80Qe2Du4MmAxIMLBghPqy4nXE",
databaseURL:"https://animezen-97635-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"animezen-97635"
});

const auth=firebase.auth();
const db=firebase.database();
const ADMIN_EMAIL="rdzaurov093@gmail.com";

let isLogin=true;

function toggleModal(id){
document.getElementById(id).classList.toggle("active");
}

function toggleAuthMode(){
isLogin=!isLogin;
authTitle.innerText=isLogin?"Вход":"Регистрация";
authActionBtn.innerText=isLogin?"Войти":"Создать";
authSwitch.innerText=isLogin?
"Нет аккаунта? Создайте!":
"Есть аккаунт? Войдите!";
}

function authAction(){
const email=authEmail.value;
const pass=authPassword.value;

if(isLogin){
auth.signInWithEmailAndPassword(email,pass)
.then(()=>toggleModal("authModal"))
.catch(e=>alert(e.message));
}else{
auth.createUserWithEmailAndPassword(email,pass)
.then(()=>toggleModal("authModal"))
.catch(e=>alert(e.message));
}
}

function logout(){auth.signOut()}

auth.onAuthStateChanged(user=>{
if(user){
authBtn.classList.add("hidden");
logoutBtn.classList.remove("hidden");
if(user.email===ADMIN_EMAIL)
adminBtn.classList.remove("hidden");
}else{
authBtn.classList.remove("hidden");
logoutBtn.classList.add("hidden");
adminBtn.classList.add("hidden");
}
});

function openNews(){
animeSection.classList.add("hidden");
newsSection.classList.remove("hidden");
setTimeout(()=>newsSection.classList.add("active"),10);
}

function openAnime(){
newsSection.classList.add("hidden");
animeSection.classList.remove("hidden");
setTimeout(()=>animeSection.classList.add("active"),10);
}

function addNews(){
db.ref("news").push({
title:newsTitle.value,
text:newsText.value,
image:newsImg.value,
date:Date.now()
});
alert("Новость опубликована!");
}

db.ref("news").on("value",snap=>{
newsContainer.innerHTML="";
snap.forEach(child=>{
const n=child.val();
newsContainer.innerHTML+=`
<div class="news-card bg-[#181822] p-6 rounded-2xl"
onclick="openNewsView(\`${n.title}\`,\`${n.text}\`,\`${n.image||""}\`)">
<h3 class="font-bold mb-2">${n.title}</h3>
<p class="text-gray-400 line-clamp-2">${n.text}</p>
</div>`;
});
});

function openNewsView(title,text,img){
viewTitle.innerText=title;
viewText.innerText=text;

if(img){
viewImg.src=img;
viewImg.classList.remove("hidden");
}else{
viewImg.classList.add("hidden");
}

toggleModal("newsViewModal");
}
</script>

</body>
</html>
