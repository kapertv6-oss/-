<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AnimeHub | Cloud Fix</title>
    <!-- 1. ПОДКЛЮЧАЕМ FIREBASE ПЕРВЫМ ДЕЛОМ -->
    <script src="https://www.gstatic.com"></script>
    <script src="https://www.gstatic.com"></script>
    
    <style>
        :root { --bg: #0a0a0c; --card: #15151a; --accent: #ff4757; --text: #fff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .auth-box { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid #333; text-align: center; width: 320px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        nav, .container { display: none; } /* Скрыто до входа */
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-box">
        <h2 id="auth-title">Вход</h2>
        <input type="text" id="logName" placeholder="Логин">
        <input type="password" id="logPass" placeholder="Пароль">
        <button id="mainBtn" onclick="processAuth()">ВОЙТИ</button>
        <p id="toggleText" onclick="toggleMode()" style="color:gray; cursor:pointer; font-size:12px; margin-top:15px">Регистрация</p>
    </div>
</div>

<script>
    // 2. ОБЪЯВЛЯЕМ ПЕРЕМЕННЫЕ В САМОМ НАЧАЛЕ
    let isReg = false;
    let currentUser = JSON.parse(localStorage.getItem('p_session'));

    // 3. КОНФИГ
    const firebaseConfig = {
      apiKey: "AIzaSyDgbNKx7k6TMk8PhUbKAW_6wYJm-aakA6c",
      authDomain: "anumehub-f0cd9.firebaseapp.com",
      projectId: "anumehub-f0cd9",
      storageBucket: "anumehub-f0cd9.firebasestorage.app",
      messagingSenderId: "789478887929",
      appId: "1:789478887929:web:8ec5e4331f456a4d07ed28",
      databaseURL: "https://anumehub-f0cd9-default-rtdb.europe-west1.firebasedatabase.app"
    };

    // Проверка загрузки Firebase
    if (typeof firebase !== 'undefined') {
        firebase.initializeApp(firebaseConfig);
        var db = firebase.database();
    } else {
        alert("Ошибка: Firebase не загружен. Проверь интернет!");
    }

    function toggleMode() {
        isReg = !isReg;
        document.getElementById('auth-title').innerText = isReg ? "Регистрация" : "Вход";
        document.getElementById('mainBtn').innerText = isReg ? "СОЗДАТЬ" : "ВОЙТИ";
    }

    function processAuth() {
        const name = document.getElementById('logName').value.trim();
        const pass = document.getElementById('logPass').value.trim();

        if(!name || !pass) return alert("Заполни поля!");

        currentUser = { name: name, role: (name === 'admin' ? 'admin' : 'user') };
        localStorage.setItem('p_session', JSON.stringify(currentUser));
        
        alert("Успешный вход! Теперь обнови страницу.");
        location.reload();
    }

    // Если уже залогинен — скрываем вход
    if(currentUser) {
        document.getElementById('auth-screen').innerHTML = "<h1>Привет, " + currentUser.name + "! Ты в системе.</h1><button onclick='localStorage.clear(); location.reload();'>Выйти</button>";
    }
</script>
</body>
</html>
