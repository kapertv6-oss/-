<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeZen — Cloud Cinema</title>
    
    <!-- ИСПРАВЛЕННЫЕ ПОДКЛЮЧЕНИЯ (Библиотеки теперь загружаются верно) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com"></script>
    <script src="https://www.gstatic.com"></script>
    
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        body { background-color: #060606; color: #f0f0f0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .purple-gradient { background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%); }
        .purple-glow { box-shadow: 0 0 30px rgba(168, 85, 247, 0.3); }
        .text-purple { color: #a855f7; }
        .modal { display: none; background: rgba(0,0,0,0.96); backdrop-filter: blur(20px); z-index: 1000; position: fixed; inset: 0; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .tab-active { border-bottom: 4px solid #a855f7 !important; color: #a855f7 !important; opacity: 1 !important; }

        /* ТА САМАЯ ПРУЖИНИСТАЯ АНИМАЦИЯ */
        .anime-card-wrap { transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); will-change: transform; cursor: pointer; }
        .anime-card-wrap:hover { transform: translateY(-18px) scale(1.04); z-index: 20; }
        .anime-card-wrap img { transition: transform 0.9s ease; }
        .anime-card-wrap:hover img { transform: scale(1.12); }

        .hero-bg { background: linear-gradient(to right, #060606 35%, transparent 100%), url('https://images.alphacoders.com'); background-size: cover; background-position: center; }
        .search-input { background: rgba(255,255,255,0.03); border: 1px solid rgba(168,85,247,0.1); backdrop-filter: blur(10px); transition: 0.4s; }
        #playerContainer iframe { width: 100%; height: 100%; border: none; border-radius: 32px; }
    </style>
</head>
<body>

    <!-- Шапка -->
    <header class="border-b border-purple-900/20 py-6 px-8 bg-[#0a0a0a]/80 backdrop-blur-2xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="text-3xl font-black tracking-tighter cursor-pointer shrink-0" onclick="location.reload()">
                <span class="text-purple italic font-black">ANIME</span>ZEN
            </div>
            <div class="hidden md:flex flex-1 max-w-md mx-12">
                <input type="text" placeholder="Поиск аниме..." class="search-input w-full px-8 py-3.5 rounded-full text-sm outline-none focus:border-purple-500/50">
            </div>
            <div class="flex items-center space-x-5">
                <a href="https://t.me" target="_blank" class="bg-[#24A1DE] text-white px-6 py-3 rounded-full text-[11px] font-black uppercase shadow-lg">ТЕЛЕГРАМ</a>
                <a id="adminLink" href="#" onclick="openModal('adminPanel')" class="hidden text-purple font-black border border-purple-500/40 px-6 py-3 rounded-full text-[11px] uppercase">АДМИНКА</a>
                <button id="authBtn" onclick="openModal('authModal')" class="purple-gradient purple-glow text-white px-9 py-3 rounded-full text-[11px] font-black uppercase tracking-widest">ВОЙТИ</button>
                <button id="logoutBtn" onclick="handleLogout()" class="hidden text-red-500 font-black text-[11px] uppercase hover:underline">ВЫЙТИ</button>
            </div>
        </div>
    </header>

    <!-- Главное Меню (Hero) -->
    <section id="heroSection" class="relative h-[500px] flex items-center shadow-2xl overflow-hidden">
        <div class="absolute inset-0 hero-bg opacity-50"></div>
        <div class="relative max-w-7xl mx-auto px-8 w-full">
            <div class="max-w-2xl">
                <span class="bg-purple-600 text-white text-[11px] px-4 py-1.5 rounded-lg font-bold uppercase tracking-widest">Cinema Experience</span>
                <h2 class="text-7xl md:text-9xl font-black mt-6 uppercase italic leading-none tracking-tighter">ANIME<span class="text-purple">ZEN</span></h2>
                <p class="mt-6 text-gray-400 text-base md:text-lg leading-relaxed max-w-md font-medium">Твоя приватная зона комфорта. Добавляй лучшие тайтлы в облако и смотри их в идеальном качестве.</p>
            </div>
        </div>
    </section>

    <!-- Сетка -->
    <main class="max-w-7xl mx-auto px-8 py-20 min-h-[700px]">
        <div class="flex items-center space-x-6 mb-16">
            <div class="h-10 w-2 purple-gradient rounded-full"></div>
            <h3 id="gridTitle" class="text-4xl font-black uppercase tracking-tighter italic">НЕДАВНИЕ <span class="text-purple">ОБНОВЛЕНИЯ</span></h3>
        </div>
        <div id="animeGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-10 text-white">
            <!-- Сюда попадут данные из Firebase -->
        </div>
    </main>

    <!-- Модалка авторизации -->
    <div id="authModal" class="modal p-4">
        <div class="bg-[#0f0f0f] border border-purple-500/20 w-full max-w-md rounded-[3.5rem] p-12 relative shadow-2xl">
            <button onclick="closeModal('authModal')" class="absolute top-10 right-10 text-gray-500 text-3xl hover:text-white">&times;</button>
            <h2 class="text-2xl font-black mb-8 italic uppercase">Вход для своих</h2>
            <div class="space-y-6">
                <input id="loginUser" type="text" placeholder="Логин" class="w-full bg-[#161616] border border-gray-800 rounded-[1.5rem] px-7 py-5 outline-none text-white focus:border-purple-500">
                <input id="loginPass" type="password" placeholder="Пароль" class="w-full bg-[#161616] border border-gray-800 rounded-[1.5rem] px-7 py-5 outline-none text-white focus:border-purple-500">
                <button onclick="handleLogin()" class="w-full purple-gradient py-5 rounded-[1.5rem] font-black uppercase tracking-widest shadow-xl">АВТОРИЗАЦИЯ</button>
            </div>
        </div>
    </div>

    <!-- Плеер -->
    <div id="playerModal" class="modal p-4">
        <div class="w-full max-w-6xl aspect-video relative bg-black rounded-[3rem] overflow-hidden border border-purple-500/20 shadow-2xl">
            <button onclick="closeModal('playerModal')" class="absolute top-8 right-8 z-50 bg-black/80 hover:bg-purple-600 w-14 h-14 rounded-full text-white text-4xl transition-all">&times;</button>
            <div id="playerContainer" class="w-full h-full"></div>
        </div>
    </div>

    <!-- Админка -->
    <div id="adminPanel" class="modal p-4">
        <div class="bg-[#0a0a0a] border-2 border-purple-600/30 w-full max-w-xl rounded-[3.5rem] p-12 relative shadow-2xl">
            <button onclick="closeModal('adminPanel')" class="absolute top-10 right-10 text-gray-500 text-3xl hover:text-white transition">&times;</button>
            <h2 class="text-3xl font-black mb-10 uppercase text-purple italic">Добавить в Облако</h2>
            <div class="space-y-5">
                <input id="aTitle" type="text" placeholder="Название" class="w-full bg-[#121212] border border-gray-800 rounded-2xl px-7 py-5 outline-none text-white focus:border-purple-500" required>
                <input id="aImg" type="text" placeholder="URL Постера" class="w-full bg-[#121212] border border-gray-800 rounded-2xl px-7 py-5 outline-none text-white focus:border-purple-500" required>
                <input id="aEp" type="text" placeholder="Серия" class="w-full bg-[#121212] border border-gray-800 rounded-2xl px-7 py-5 outline-none text-white focus:border-purple-500">
                <textarea id="aFrame" placeholder="Код плеера <iframe...>" class="w-full bg-[#121212] border border-gray-800 rounded-2xl px-7 py-5 outline-none text-white h-36 font-mono text-xs focus:border-purple-500" required></textarea>
                <button id="saveBtn" class="w-full purple-gradient py-6 rounded-2xl font-black uppercase hover:opacity-90 active:scale-95 transition-all">ОПУБЛИКОВАТЬ</button>
            </div>
        </div>
    </div>

    <script>
        // 1. ДАННЫЕ (Объявлены ОДИН раз)
        const ADMIN_DATA = { user: "Admin", pass: "kjkszpj006" };
        let isAdmin = localStorage.getItem('isZenAdmin') === 'true';

        // 2. ИНИЦИАЛИЗАЦИЯ ПРИ ЗАГРУЗКЕ
        window.onload = function() {
            if (typeof firebase === 'undefined') {
                console.error("firebase load error: проверь подключение скриптов");
                return;
            }

            const firebaseConfig = {
                apiKey: "AIce5yAUigsnR8O0e2Du4M/IMLBghPqyAnXE",
                authDomain: "animezen-97635.firebaseapp.com",
                databaseURL: "https://animezen-97635-default-rtdb.europe-west1.firebasedatabase.app",
                projectId: "animezen-97635"
            };

            firebase.initializeApp(firebaseConfig);
            window.db = firebase.database();

            checkAdminState();
            renderAnime();
        };

        // 3. ФУНКЦИИ ИНТЕРФЕЙСА
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
            if (id === 'playerModal') document.getElementById('playerContainer').innerHTML = '';
        }

        function handleLogin() {
            const u = document.getElementById('loginUser').value;
            const p = document.getElementById('loginPass').value;
            if(u === ADMIN_DATA.user && p === ADMIN_DATA.pass) {
                localStorage.setItem('isZenAdmin', 'true');
                alert("Добро пожаловать, босс!");
                location.reload();
            } else { alert("Неверные данные доступа!"); }
        }

        function handleLogout() {
            localStorage.removeItem('isZenAdmin');
            location.reload();
        }

        function checkAdminState() {
            if (isAdmin) {
                document.getElementById('adminLink').classList.remove('hidden');
                document.getElementById('logoutBtn').classList.remove('hidden');
                document.getElementById('authBtn').classList.add('hidden');
            }
        }

        // 4. ЛОГИКА БАЗЫ ДАННЫХ
        document.getElementById('saveBtn').onclick = function() {
            const title = document.getElementById('aTitle').value;
            const img = document.getElementById('aImg').value;
            const ep = document.getElementById('aEp').value;
            const frame = document.getElementById('aFrame').value;

            if (!title || !img || !frame) return alert("Заполни важные поля!");

            window.db.ref('anime').push().set({
                title: title,
                poster: img,
                episodes: ep,
                player: frame,
                timestamp: Date.now()
            }).then(() => {
                alert("Успешно добавлено в облако!");
                location.reload();
            }).catch(e => alert("Ошибка! Проверь правила БД (Rules)."));
        };

        function playAnime(frameCode) {
            document.getElementById('playerContainer').innerHTML = frameCode;
            openModal('playerModal');
        }

        function renderAnime() {
            const grid = document.getElementById('animeGrid');
            window.db.ref('anime').on('value', (snap) => {
                grid.innerHTML = '';
                const data = snap.val();
                if(!data) return;
                
                Object.keys(data).reverse().forEach(id => {
                    const item = data[id];
                    grid.innerHTML += `
                        <div class="anime-card-wrap" onclick='playAnime(${JSON.stringify(item.player)})'>
                            <div class="relative overflow-hidden rounded-[2rem] border border-white/5 shadow-2xl mb-5">
                                <img src="${item.poster}" class="w-full h-72 object-cover">
                                <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
                            </div>
                            <h4 class="font-black text-sm uppercase truncate tracking-tight">${item.title}</h4>
                            <p class="text-[10px] text-purple font-black mt-1 tracking-widest uppercase">${item.episodes || '??'} EPISODES</p>
                        </div>
                    `;
                });
            });
        }
    </script>
</body>
</html>
