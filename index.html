<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AnimeHub | Profile Editor</title>
    <style>
        :root { --bg: #0a0a0c; --card: #15151a; --accent: #ff4757; --text: #fff; --panel: #111; --gold: #ffd700; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
        
        #notify-box { position: fixed; top: 70px; right: 20px; z-index: 9999; pointer-events: none; }
        .toast { background: var(--accent); color: #fff; padding: 12px 20px; border-radius: 8px; margin-bottom: 10px; box-shadow: 0 5px 15px rgba(255,71,87,0.4); animation: slide 0.3s ease forwards; pointer-events: auto; }
        @keyframes slide { from { transform: translateX(120%); } to { transform: translateX(0); } }

        nav { display: none; justify-content: space-between; padding: 10px 5%; background: var(--panel); border-bottom: 1px solid #222; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .nav-links { display: flex; gap: 15px; }
        .nav-links span { cursor: pointer; font-size: 14px; transition: 0.2s; }
        .nav-links span:hover { color: var(--accent); }

        .container { padding: 20px 5%; display: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 25px; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #222; cursor: pointer; transition: 0.3s; position: relative; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .card img { width: 100%; height: 280px; object-fit: cover; }
        
        /* Панели */
        .panel-box { background: #111; padding: 25px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        input, button, textarea { padding: 10px; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; margin: 5px 0; width: 100%; box-sizing: border-box; }
        button { background: var(--accent); border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { opacity: 0.8; }
        .btn-mini { width: auto; padding: 5px 15px; background: #222; font-size: 12px; }

        /* Модалка */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; justify-content: center; align-items: center; }
        .modal-layout { display: flex; width: 95%; max-width: 1300px; height: 85vh; background: #000; border-radius: 15px; overflow: hidden; border: 1px solid #333; }
        .video-side { flex: 3; display: flex; flex-direction: column; }
        .video-wrapper { flex: 1; position: relative; }
        .video-wrapper iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div id="notify-box"></div>

<!-- Вход -->
<div id="auth-screen">
    <div style="background:var(--card); padding:30px; border-radius:15px; border:1px solid #333; text-align:center; width:320px;">
        <h2 id="auth-title">Вход</h2>
        <input type="text" id="logName" placeholder="Логин">
        <input type="password" id="logPass" placeholder="Пароль">
        <button onclick="processAuth()">ВОЙТИ</button>
        <p onclick="toggleMode()" style="font-size:12px; color:gray; cursor:pointer; margin-top:15px">Регистрация</p>
    </div>
</div>

<nav id="mainNav">
    <h2 onclick="showSection('main')" style="cursor:pointer; margin:0">ANIME<span style="color:var(--accent)">HUB</span></h2>
    <div class="nav-links">
        <span onclick="showSection('main')">Каталог</span>
        <span onclick="showSection('favs')">Избранное</span>
        <span onclick="showSection('admin')" id="admBtn" style="display:none; color:var(--accent)">Админка</span>
    </div>
    <div class="user-info" style="display:flex; align-items:center; gap:10px">
        <div style="text-align:right; font-size:12px"><b id="uNameShow"></b><br><span id="uIdShow" style="color:var(--accent)"></span></div>
        <img id="myAv" onclick="showSection('profile')" style="width:40px; height:40px; border-radius:50%; border:2px solid var(--accent); cursor:pointer">
        <button class="btn-mini" onclick="logout()">Выход</button>
    </div>
</nav>

<div class="container" id="mainContent">
    <!-- Редактор Профиля -->
    <div id="sec-profile" class="panel-box" style="display:none">
        <h2>Настройки профиля</h2>
        <div style="max-width:400px">
            <label>Новое имя:</label>
            <input type="text" id="editName" placeholder="Введите ник">
            <button onclick="updateName()">Сменить имя</button>
            <hr style="border:1px solid #222; margin:20px 0">
            <label>Смена пароля:</label>
            <input type="password" id="oldPass" placeholder="Старый пароль">
            <input type="password" id="newPass" placeholder="Новый пароль">
            <button onclick="updatePass()">Обновить пароль</button>
        </div>
    </div>

    <!-- Админка -->
    <div id="sec-admin" class="panel-box" style="display:none">
        <h3>Добавить аниме</h3>
        <input type="text" id="a-title" placeholder="Название">
        <input type="text" id="a-poster" placeholder="Постер (URL)">
        <textarea id="a-vids" placeholder="Ссылки на серии через запятую"></textarea>
        <button onclick="addAnime()">ВЫЛОЖИТЬ</button>
    </div>

    <div id="sec-main" class="grid"></div>
    <div id="sec-favs" class="grid" style="display:none"></div>
</div>

<!-- Модалка Плеера -->
<div id="playerModal" class="modal">
    <div class="modal-layout">
        <div class="video-side">
            <div style="padding:15px; display:flex; justify-content:space-between; background:#111">
                <b id="m-title"></b>
                <span onclick="closePlayer()" style="cursor:pointer">Закрыть X</span>
            </div>
            <div class="video-wrapper" id="videoArea"></div>
            <div style="background:#111; padding:10px; display:flex; gap:8px; overflow-x:auto" id="epBar"></div>
        </div>
    </div>
</div>

<script>
    let isReg = false;
    let animeDB = JSON.parse(localStorage.getItem('p_anime')) || [];
    let usersDB = JSON.parse(localStorage.getItem('p_users')) || [];
    let currentUser = JSON.parse(localStorage.getItem('p_session'));

    function toast(text) {
        const box = document.getElementById('notify-box');
        const el = document.createElement('div');
        el.className = 'toast'; el.innerText = text;
        box.appendChild(el); setTimeout(() => el.remove(), 4000);
    }

    function toggleMode() { isReg = !isReg; document.getElementById('auth-title').innerText = isReg ? "Регистрация" : "Вход"; }

    function processAuth() {
        const name = document.getElementById('logName').value.trim(), pass = document.getElementById('logPass').value.trim();
        // Админ по умолчанию для тебя
        if(name === 'admin' && pass === '123') {
            currentUser = { id: 0, name: 'Admin', pass: '123', role: 'admin', favs: [], subs: {}, watchLater: {} };
        } else {
            let found = usersDB.find(u => u.name === name);
            if(isReg) {
                if(found) return alert("Ник занят!");
                currentUser = { id: usersDB.length+1, name, pass, role:'user', favs:[], subs:{}, watchLater:{} };
                usersDB.push(currentUser); localStorage.setItem('p_users', JSON.stringify(usersDB));
            } else {
                if(!found || found.pass !== pass) return alert("Ошибка входа!");
                currentUser = found;
            }
        }
        localStorage.setItem('p_session', JSON.stringify(currentUser));
        location.reload();
    }

    window.onload = () => {
        if(currentUser) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('mainNav').style.display = 'flex';
            document.getElementById('mainContent').style.display = 'block';
            updateUI();
            renderCards('sec-main', animeDB);
        }
    };

    function updateUI() {
        document.getElementById('uNameShow').innerText = currentUser.name;
        document.getElementById('uIdShow').innerText = "ID: " + currentUser.id;
        document.getElementById('myAv').src = "https://encrypted-tbn0.gstatic.com";
        if(currentUser.role === 'admin') document.getElementById('admBtn').style.display = 'block';
    }

    // РЕДАКТИРОВАНИЕ ПРОФИЛЯ
    function updateName() {
        const newName = document.getElementById('editName').value.trim();
        if(!newName) return;
        if(usersDB.find(u => u.name === newName)) return toast("Имя уже занято!");

        // Обновляем в базе
        const idx = usersDB.findIndex(u => u.id === currentUser.id);
        currentUser.name = newName;
        if(idx !== -1) usersDB[idx].name = newName;
        
        saveAll();
        toast("Имя изменено!");
        updateUI();
    }

    function updatePass() {
        const oldP = document.getElementById('oldPass').value;
        const newP = document.getElementById('newPass').value;
        
        if(oldP !== currentUser.pass) return toast("Старый пароль неверен!");
        if(newP.length < 3) return toast("Пароль слишком короткий!");

        currentUser.pass = newP;
        const idx = usersDB.findIndex(u => u.id === currentUser.id);
        if(idx !== -1) usersDB[idx].pass = newP;

        saveAll();
        toast("Пароль успешно обновлен!");
        document.getElementById('oldPass').value = '';
        document.getElementById('newPass').value = '';
    }

    function saveAll() {
        localStorage.setItem('p_users', JSON.stringify(usersDB));
        localStorage.setItem('p_session', JSON.stringify(currentUser));
    }

    // ОСТАЛЬНОЕ
    function renderCards(id, data) {
        const g = document.getElementById(id); g.innerHTML = '';
        data.forEach((a, i) => {
            g.innerHTML += `<div class="card" onclick="openPlayer(${animeDB.indexOf(a)})">
                <img src="${a.i || 'https://via.placeholder.com'}">
                <div style="padding:10px; text-align:center"><b>${a.t}</b></div>
            </div>`;
        });
    }

    function openPlayer(idx) {
        const a = animeDB[idx];
        document.getElementById('playerModal').style.display = 'flex';
        document.getElementById('m-title').innerText = a.t;
        const bar = document.getElementById('epBar'); bar.innerHTML = '';
        a.vids.forEach((link, i) => {
            bar.innerHTML += `<button class="btn-mini" onclick="setVid('${link}')">Серия ${i+1}</button>`;
        });
        setVid(a.vids);
    }

    function setVid(url) { document.getElementById('videoArea').innerHTML = `<iframe src="${url}" allowfullscreen allow="autoplay"></iframe>`; }
    function closePlayer() { document.getElementById('playerModal').style.display = 'none'; document.getElementById('videoArea').innerHTML = ''; }
    
    function showSection(id) {
        document.querySelectorAll('.container > div').forEach(d => d.style.display = 'none');
        const s = document.getElementById('sec-' + id);
        s.style.display = (id === 'main' || id === 'favs') ? 'grid' : 'block';
        if(id === 'favs') renderCards('sec-favs', animeDB.filter(a => currentUser.favs.includes(a.t)));
    }

    function addAnime() {
        const t = document.getElementById('a-title').value, i = document.getElementById('a-poster').value, v = document.getElementById('a-vids').value;
        const vids = v.split(',').map(s => s.trim());
        animeDB.push({ t, i, vids });
        localStorage.setItem('p_anime', JSON.stringify(animeDB));
        location.reload();
    }

    function logout() { localStorage.removeItem('p_session'); location.reload(); }
</script>
</body>
</html>
