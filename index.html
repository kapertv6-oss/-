<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeZen — Твой личный каталог</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --accent: #9b59b6; --glass: rgba(255, 255, 255, 0.05); }
        
        body { 
            background: #050505 center/cover fixed no-repeat; color: white; 
            font-family: 'Inter', sans-serif; margin: 0; transition: background 0.5s ease;
            overflow-x: hidden;
        }

        .overlay-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: -1; }

        header {
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--glass); backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 1000; flex-wrap: wrap; gap: 15px;
        }
        .logo { font-size: 26px; font-weight: 700; color: var(--accent); letter-spacing: -1px; text-decoration: none; }

        /* Поисковая строка */
        .search-box {
            flex: 1; max-width: 400px; position: relative;
        }
        .search-box input {
            width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 20px; border-radius: 25px; color: white; outline: none;
            font-family: inherit; transition: 0.3s;
        }
        .search-box input:focus { border-color: var(--accent); background: rgba(255,255,255,0.15); }

        .container { padding: 40px 5%; }
        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 25px; }

        .anime-card {
            position: relative; height: 320px; background: #111;
            border-radius: 18px; overflow: hidden; cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid var(--glass);
        }
        .anime-card.hidden { display: none; }
        .anime-card:hover { transform: scale(1.05); border-color: var(--accent); box-shadow: 0 0 30px rgba(155, 89, 182, 0.2); }
        .anime-card img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); display: flex; align-items: flex-end; padding: 15px; }
        .card-info h3 { font-size: 14px; margin: 0; font-weight: 600; }

        /* ПЛЕЕР */
        #player-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); 
            z-index: 2000; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px;
        }
        .player-wrapper { width: 100%; max-width: 1000px; display: flex; flex-direction: column; gap: 15px; }
        .video-box { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 15px; overflow: hidden; border: 1px solid var(--glass); }
        iframe { width: 100%; height: 100%; border: none; }

        /* СЕРИИ ВНИЗУ */
        .episodes-bar {
            display: flex; gap: 10px; overflow-x: auto; padding: 10px 5px;
            scrollbar-width: thin; scrollbar-color: var(--accent) transparent;
        }
        .episodes-bar::-webkit-scrollbar { height: 4px; }
        .episodes-bar::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        .ep-card {
            min-width: 120px; padding: 10px; background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
            text-align: center; cursor: pointer; transition: 0.3s;
            font-size: 12px; font-weight: 600; color: #aaa; white-space: nowrap;
        }
        .ep-card:hover { background: rgba(255,255,255,0.1); color: white; }
        .ep-card.active { background: var(--accent); color: white; border-color: transparent; }

        .close-player { align-self: flex-end; color: #888; cursor: pointer; font-weight: 700; font-size: 12px; letter-spacing: 1px; }

        .wall-label { background: var(--glass); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 12px; transition: 0.3s; white-space: nowrap; }
        .wall-label:hover { background: var(--accent); }
        #wall-input { display: none; }
    </style>
</head>
<body>

    <div class="overlay-bg"></div>

    <header>
        <a href="#" class="logo">AnimeZen</a>
        <div class="search-box">
            <input type="text" id="animeSearch" placeholder="Поиск аниме..." oninput="searchAnime()">
        </div>
        <label for="wall-input" class="wall-label">Фон из галереи</label>
        <input type="file" id="wall-input" accept="image/*" onchange="uploadWallpaper(this)">
    </header>

    <div class="container">
        <div class="anime-grid" id="grid"></div>
    </div>

    <div id="player-overlay">
        <div class="player-wrapper">
            <div class="close-player" onclick="closePlayer()">ЗАКРЫТЬ [ESC]</div>
            <div class="video-box">
                <iframe id="videoFrame" src="" allowfullscreen></iframe>
            </div>
            <div class="episodes-bar" id="epBar"></div>
        </div>
    </div>

        function renderGrid() {
            document.getElementById('grid').innerHTML = animeData.map((anime, i) => `
                <div class="anime-card" data-title="${anime.title.toLowerCase()}" onclick="openAnime(${i})">
                    <img src="${anime.poster}" alt="${anime.title}" loading="lazy">
                    <div class="card-info"><h3>${anime.title}</h3></div>
                </div>
            `).join('');
        }

        function searchAnime() {
            const query = document.getElementById('animeSearch').value.toLowerCase();
            const cards = document.querySelectorAll('.anime-card');
            cards.forEach(card => {
                const title = card.getAttribute('data-title');
                card.classList.toggle('hidden', !title.includes(query));
            });
        }

        function openAnime(idx) {
            const anime = animeData[idx];
            const bar = document.getElementById('epBar');
            bar.innerHTML = anime.episodes.map((ep, ei) => `
                <div class="ep-card ${ei === 0 ? 'active' : ''}" onclick="switchEp('${ep.url}', this)">
                    ${ep.name}
                </div>
            `).join('');
            switchEp(anime.episodes[0].url);
            document.getElementById('player-overlay').style.display = 'flex';
        }

        function switchEp(url, el) {
            document.getElementById('videoFrame').src = url;
            if(el) {
                document.querySelectorAll('.ep-card').forEach(c => c.classList.remove('active'));
                el.classList.add('active');
            }
        }

        function closePlayer() {
            document.getElementById('player-overlay').style.display = 'none';
            document.getElementById('videoFrame').src = "";
        }

        function uploadWallpaper(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const bgData = e.target.result;
                    document.body.style.backgroundImage = `url('${bgData}')`;
                    try {
                        localStorage.setItem('animezen_bg_local', bgData);
                    } catch(err) {
                        alert("Картинка слишком большая для сохранения в памяти браузера, но она будет видна сейчас.");
                    }
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        window.onload = () => {
            const saved = localStorage.getItem('animezen_bg_local');
            if(saved) document.body.style.backgroundImage = `url('${saved}')`;
            renderGrid();
        };

        window.onkeydown = (e) => { if(e.key === "Escape") closePlayer(); };
    </script>
</body>
</html>
